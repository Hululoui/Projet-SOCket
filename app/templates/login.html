{% extends "base.html" %}
{% block title %} — connexion{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 3rem auto 0;">
    <div class="eyebrow" style="text-align:center;">accès sécurisé</div>
    <h1 style="text-align:center; margin-bottom:1.6rem;">Connexion analyste</h1>
    {% if erreur %}
    <div class="flash error">{{ erreur }}</div>
    {% endif %}
    <div class="panel">
        <form method="POST">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required autofocus>
            <label>Mot de passe</label>
            <input type="password" name="password" required>
            <div class="form-actions">
                <button type="submit" style="width:100%;">Se connecter</button>
            </div>
        </form>
    </div>
    <p style="text-align:center; margin-top:1rem; color:var(--text-dim); font-size:0.85rem;">
        Pas de compte ? <a href="{{ url_for('register') }}">En créer un</a>
    </p>
</div>
{% endblock %}
