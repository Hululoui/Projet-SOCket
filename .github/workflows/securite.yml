name: Analyse de sécurité

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installer les outils de scan
        run: pip install bandit safety
      - name: Scanner le code avec bandit
        run: bandit -r app/ -f txt || true
      - name: Vérifier les dépendances avec safety
        run: safety check -r app/requirements.txt || true

  build:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image Docker
        run: docker build -t socket-app-test ./app
      - name: Verifier que l'image demarre correctement
        run: |
          docker run -d --name test-container -p 5000:5000 socket-app-test
          sleep 5
          docker logs test-container
          docker stop test-container